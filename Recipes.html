<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Recipe Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('recipe_box_theme') === 'dark' || (!('recipe_box_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        sage: {
                            DEFAULT: '#87a96b',
                            dark: '#6e8a56'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            /* Support for iPhone notch/home bar */
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .sage-bg { background-color: #87a96b; }
        .sage-text { color: #87a96b; }
        .sage-border { border-color: #87a96b; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #2d2d2d; }
        ::-webkit-scrollbar-thumb { background: #87a96b; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; color: black !important; }
            .modal-content { box-shadow: none; border: none; width: 100%; position: static; }
        }

        .tag-chip {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .tag-chip.active {
            background-color: #87a96b;
            color: white;
            border-color: #87a96b;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .recipe-card-img {
            height: 160px;
            object-fit: cover;
        }

        /* Ensure the close button is always visible on mobile browsers with dynamic bars */
        .safe-top-button {
            top: calc(1rem + env(safe-area-inset-top));
        }
    </style>
</head>
<body class="bg-[#fcfcfc] text-gray-800 dark:bg-[#121212] dark:text-gray-200 antialiased">

    <div id="toast" class="toast shadow-lg text-sm font-medium">Copied to clipboard!</div>

    <!-- Header -->
    <header class="bg-white dark:bg-[#1a1a1a] border-b border-gray-100 dark:border-gray-800 sticky top-0 z-30 no-print">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold sage-text tracking-tight">The Recipe Box</h1>
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors" title="Toggle Dark Mode">
                        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l.707-.707ZM12 7a5 5 0 100 10 5 5 0 000-10z"></path>
                        </svg>
                        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                        </svg>
                    </button>
                    <button onclick="promptForSource()" class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">Settings</button>
                </div>
            </div>
            
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search by title or ingredient..." 
                       class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-[#252525] border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#87a96b] focus:border-transparent transition-all dark:text-white">
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <div id="tagContainer" class="flex flex-wrap gap-2 overflow-x-auto pb-1 no-scrollbar">
                <span id="allTag" class="tag-chip active px-3 py-1 rounded-full text-sm border sage-border" onclick="filterByTag('All')">All</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-8 no-print">
        <div id="loading" class="text-center py-20 text-gray-400 italic">Connecting to source...</div>
        <div id="recipeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
        <div id="emptyState" class="hidden text-center py-20">
            <p class="text-gray-400 italic">No recipes found matching your search.</p>
        </div>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="fixed inset-0 z-50 hidden no-print">
        <div class="absolute inset-0 bg-black bg-opacity-40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute bottom-0 sm:top-10 sm:bottom-auto sm:left-1/2 sm:-translate-x-1/2 w-full max-w-2xl bg-white dark:bg-[#1a1a1a] rounded-t-3xl sm:rounded-2xl shadow-2xl max-h-[95vh] overflow-y-auto overflow-x-hidden">
            <div id="modalContent" class="relative">
                <button onclick="closeModal()" class="absolute right-4 safe-top-button p-2 bg-white/90 dark:bg-black/60 backdrop-blur shadow-sm rounded-full z-20 hover:bg-white dark:hover:bg-black transition-colors">
                    <svg class="w-6 h-6 text-gray-600 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div id="modalInner"></div>
            </div>
        </div>
    </div>

    <div id="printContainer" class="hidden print:block p-8"></div>

    <script>
        let dataSourceUrl = localStorage.getItem('recipe_box_url') || '';
        let recipes = [];
        let currentFilter = 'All';
        let searchQuery = '';

        async function init() {
            if (!dataSourceUrl) {
                recipes = [
                    {
                        id: 1,
                        title: "Setup Needed",
                        imageUrl: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe?w=800",
                        category: "System",
                        tags: ["Setup"],
                        prepTime: "2 mins",
                        ingredients: ["Click 'Settings' in top right", "Paste your JSON URL", "Save and Refresh"],
                        instructions: ["Create a Gist on GitHub.", "Click the 'Raw' button to get the data link.", "Paste it into the Settings here."]
                    }
                ];
                finishInit();
            } else {
                fetchData();
            }

            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderRecipes();
            });
        }

        async function fetchData() {
            try {
                if (dataSourceUrl.includes('gist.github.com') && !dataSourceUrl.includes('gist.githubusercontent.com')) {
                    throw new Error("Invalid Gist URL. You must click the 'Raw' button on GitHub and use that specific URL.");
                }

                const response = await fetch(dataSourceUrl, { cache: 'no-store' });
                if (!response.ok) throw new Error("File not found. Make sure your Gist is Public.");
                
                const textData = await response.text();
                let jsonData;
                
                try {
                    jsonData = JSON.parse(textData);
                } catch (e) {
                    throw new Error("The file is not a valid JSON. Check for missing commas or quotes in your Gist.");
                }
                
                if (!Array.isArray(jsonData)) {
                    throw new Error("Your JSON must be a LIST (starting with [ and ending with ]). Currently it is a single object.");
                }

                recipes = jsonData;
                finishInit();
            } catch (err) {
                console.error("Fetch error:", err);
                alert("Recipe Box Error: " + err.message);
                document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold">Error: ${err.message}</div><div class="mt-4 text-xs">Update your URL in Settings.</div>`;
            }
        }

        function finishInit() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('recipeGrid').classList.remove('hidden');
            renderTags();
            renderRecipes();
        }

        function promptForSource() {
            const newUrl = prompt("Paste your JSON 'Raw' URL here:", dataSourceUrl);
            if (newUrl !== null) {
                localStorage.setItem('recipe_box_url', newUrl.trim());
                location.reload();
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('recipe_box_theme', isDark ? 'dark' : 'light');
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const categories = [...new Set(recipes.map(r => r.category || 'General'))];
            const tags = [...new Set(recipes.flatMap(r => r.tags || []))];
            const allTags = [...new Set([...categories, ...tags])].sort();
            
            const allTag = document.getElementById('allTag');
            container.innerHTML = '';
            container.appendChild(allTag);

            allTags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag-chip px-3 py-1 rounded-full text-sm border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] text-gray-600 dark:text-gray-400 whitespace-nowrap';
                span.innerText = tag;
                span.onclick = () => filterByTag(tag);
                container.appendChild(span);
            });
        }

        function filterByTag(tag) {
            currentFilter = tag;
            const chips = document.querySelectorAll('.tag-chip');
            chips.forEach(chip => {
                if (chip.innerText === tag) {
                    chip.classList.add('active', 'sage-border');
                    chip.classList.remove('border-gray-200', 'dark:border-gray-700');
                } else {
                    chip.classList.remove('active', 'sage-border');
                    chip.classList.add('border-gray-200', 'dark:border-gray-700');
                }
            });
            renderRecipes();
        }

        function renderRecipes() {
            const grid = document.getElementById('recipeGrid');
            const emptyState = document.getElementById('emptyState');
            
            const filtered = recipes.filter(r => {
                const title = (r.title || '').toLowerCase();
                const ingredients = (r.ingredients || []).map(i => i.toLowerCase());
                const matchesSearch = title.includes(searchQuery) || ingredients.some(i => i.includes(searchQuery));
                const matchesTag = currentFilter === 'All' || 
                                  r.category === currentFilter || 
                                  (r.tags && r.tags.includes(currentFilter));
                return matchesSearch && matchesTag;
            });

            grid.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(recipe => {
                    const card = `
                        <div class="bg-white dark:bg-[#1a1a1a] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden hover:shadow-md transition-shadow cursor-pointer" 
                             onclick="openRecipe(${recipe.id})">
                            ${recipe.imageUrl ? `<img src="${recipe.imageUrl}" class="w-full recipe-card-img" alt="${recipe.title}" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1495195129352-aeb325a55b65?w=800';">` : `<div class="w-full h-32 bg-gray-50 dark:bg-gray-800 flex items-center justify-center text-gray-200 dark:text-gray-700"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path></svg></div>`}
                            <div class="p-5">
                                <span class="text-[10px] font-bold uppercase tracking-widest sage-text mb-1 block">${recipe.category || 'General'}</span>
                                <h3 class="text-lg font-semibold mb-2 dark:text-white">${recipe.title || 'Untitled Recipe'}</h3>
                                <div class="flex flex-wrap gap-1 mb-3">
                                    ${(recipe.tags || []).map(t => `<span class="text-[10px] bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded">${t}</span>`).join('')}
                                </div>
                                <div class="flex items-center text-xs text-gray-400 dark:text-gray-500">
                                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                    ${recipe.prepTime || 'N/A'}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            }
        }

        function openRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            const modalInner = document.getElementById('modalInner');
            
            modalInner.innerHTML = `
                ${recipe.imageUrl ? `<img src="${recipe.imageUrl}" class="w-full h-64 object-cover" alt="${recipe.title}" onerror="this.style.display='none'">` : ''}
                <div class="p-6 sm:p-10">
                    <span class="text-xs font-bold uppercase tracking-widest sage-text mb-2 block">${recipe.category || 'General'}</span>
                    <h2 class="text-3xl font-bold mb-4 pr-8 dark:text-white">${recipe.title || 'Untitled Recipe'}</h2>
                    
                    <div class="flex flex-wrap gap-2 mb-8">
                        ${(recipe.tags || []).map(t => `<span class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-3 py-1 rounded-full text-xs">#${t}</span>`).join('')}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="font-bold text-lg dark:text-white">Ingredients</h4>
                                <button onclick="copyIngredients(${recipe.id})" class="text-xs sage-text font-semibold hover:underline flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                    Copy List
                                </button>
                            </div>
                            <ul class="space-y-2">
                                ${(recipe.ingredients || []).map(i => `<li class="flex items-start text-gray-600 dark:text-gray-400"><span class="sage-text mr-2">•</span>${i}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div>
                            <h4 class="font-bold text-lg mb-4 dark:text-white">Instructions</h4>
                            <ol class="space-y-4">
                                ${(recipe.instructions || []).map((step, idx) => `
                                    <li class="flex gap-4">
                                        <span class="flex-shrink-0 w-6 h-6 rounded-full sage-bg text-white flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                                        <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">${step}</p>
                                    </li>
                                `).join('')}
                            </ol>
                        </div>
                    </div>

                    <div class="mt-12 pt-6 border-t border-gray-100 dark:border-gray-800 flex gap-4">
                        <button onclick="window.print()" class="flex-1 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-semibold py-3 rounded-xl transition-colors flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            Print Recipe
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('printContainer').innerHTML = `
                <h1 style="font-size: 24pt; margin-bottom: 10px;">${recipe.title}</h1>
                <p style="color: #666; margin-bottom: 20px;">Category: ${recipe.category} | Prep: ${recipe.prepTime}</p>
                <h3>Ingredients</h3>
                <ul>${(recipe.ingredients || []).map(i => `<li>${i}</li>`).join('')}</ul>
                <h3>Instructions</h3>
                <ol>${(recipe.instructions || []).map(step => `<li>${step}</li>`).join('')}</ol>
            `;

            document.getElementById('recipeModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('recipeModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function copyIngredients(id) {
            const recipe = recipes.find(r => r.id === id);
            const text = (recipe.ingredients || []).map(i => `[ ] ${i}`).join('\n');
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
